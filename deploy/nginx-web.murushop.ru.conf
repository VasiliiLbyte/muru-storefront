# Storefront staging: web.murushop.ru → Next.js on 127.0.0.1:3000
# VPS: 109.172.38.194 (same host as murushop.ru — separate server_name, no conflict)
#
# Apply:
#   sudo cp deploy/nginx-web.murushop.ru.conf /etc/nginx/sites-available/web.murushop.ru.conf
#   sudo ln -sf /etc/nginx/sites-available/web.murushop.ru.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d web.murushop.ru
#
# SSL paths below match certbot layout (see MURU_miniAPP/deploy/nginx-murushop.ru.conf).

server {
    listen 443 ssl;
    server_name web.murushop.ru;

    ssl_certificate /etc/letsencrypt/live/web.murushop.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/web.murushop.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (mirrors next.config.ts baseline)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
}

server {
    listen 80;
    server_name web.murushop.ru;
    return 301 https://$host$request_uri;
}
